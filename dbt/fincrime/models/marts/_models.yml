version: 2

models:
  - name: fct_alerts
    description: "Consolidated alerts from all four rules (fan_out, fan_in, cycle, velocity)"
    columns:
      - name: alert_key
        description: "Composite unique key (rule_name + account_id)"
        tests:
          - not_null
          - unique
      - name: rule_name
        description: "Which rule generated this alert"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['fan_out', 'fan_in', 'cycle', 'velocity']
      - name: account_id
        description: "Account that triggered the alert"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_accounts')
                field: account_id
      - name: severity
        description: "Severity score — higher is more anomalous"
        tests:
          - not_null
      - name: alert_id
        description: "Unique identifier for the alert (hash of rule_name + account_id)"
      - name: metric_value
        description: "Raw value of the underlying metric that triggered the alert (e.g. unique_destinations count for fan_out)"
      - name: ground_truth_label
        description: "Whether the account is involved in laundering (training only)"
      - name: generated_at
        description: "Timestamp when the alert was generated"

  - name: dim_accounts
    description: >
      Complete account registry — one row for every account that has appeared
      in the transaction data, whether as sender, receiver, or both. Used by
      the Power BI dashboard, the Streamlit investigator workbench, and as
      contextual features in the ML scoring pipeline.

     # sender and receiver features
    columns:
      - name: account_id
        description: "Composite account identifier (bank:account)"
        tests:
          - not_null
          - unique
      - name: is_laundering_account
        description: "Flag indicating if the account is involved in laundering activities"
        tests:
          - not_null
      - name: total_txn_sent
        description: >
         Total number of transactions this account sent.

      - name: total_amount_sent
        description: >
         Total amount this account sent, in original transaction currency.

      - name: unique_destinations_sent
        description: >
         Number of distinct destination accounts this account has sent to.

      - name: unique_currencies_sent
        description: >
         Number of distinct currencies this account has used when sending.

      - name: unique_payment_methods_sent
        description: >
         Number of distinct payment methods this account has used when sending.

      - name: active_days_sent
        description: >
         Number of days between this account's first and last sent transaction.

      - name: first_txn_sent_at
        description: >
         Timestamp of the first transaction this account sent.

      - name: last_txn_sent_at
        description: >
         Timestamp of the most recent transaction this account sent.

      - name: total_txn_received
        description: >
         Total number of transactions this account received.

      - name: total_amount_received
        description: >
         Total amount this account received, in original transaction currency.

      - name: unique_sources_received
        description: >
         Number of distinct source accounts this account has received from.

      - name: unique_currencies_received
        description: >
         Number of distinct currencies this account has used when receiving.

      - name: unique_payment_methods_received
        description: >
         Number of distinct payment methods this account has used when receiving.

      - name: active_days_received
        description: >
         Number of days between this account's first and last received transaction.

      - name: first_txn_received_at
        description: >
         Timestamp of the first transaction this account received.

      - name: last_txn_received_at
        description: >
         Timestamp of the most recent transaction this account received.

      - name: is_receiver
        description: >
         True if this account has ever received a transaction.
