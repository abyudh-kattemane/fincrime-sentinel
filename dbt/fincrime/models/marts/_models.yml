version: 2

models:
  - name: fct_alerts
    description: >
      Canonical alerts table consolidating outputs from the rules engine.
      Week 3 implementation: fan-out rule only. Will expand to all four
      typologies in Week 4 alongside ML scoring integration.
    columns:
      - name: alert_id
        description: "Deterministic alert identifier"
        tests:
          - not_null

      - name: alert_key
        description: "Composite unique key (rule_name + account_id)"
        tests:
          - not_null
          - unique

      - name: rule_name
        description: "Which rule generated this alert"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['fan_out', 'fan_in', 'cycle', 'velocity']

      - name: account_id
        description: "Account that triggered the alert"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int_account_transaction_features')
                field: account_id

      - name: severity
        description: "Severity score — higher is more anomalous"
        tests:
          - not_null

      - name: ground_truth_label
        description: "Was this account actually laundering"
        tests:
          - not_null
