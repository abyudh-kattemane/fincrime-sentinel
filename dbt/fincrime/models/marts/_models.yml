version: 2

models:
  - name: fct_alerts
    description: "Consolidated alerts from all four rules (fan_out, fan_in, cycle, velocity)"
    columns:
      - name: alert_key
        description: "Composite unique key (rule_name + account_id)"
        tests:
          - not_null
          - unique
      - name: rule_name
        description: "Which rule generated this alert"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['fan_out', 'fan_in', 'cycle', 'velocity']
      - name: account_id
        description: "Account that triggered the alert"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_accounts')
                field: account_id
      - name: severity
        description: "Severity score — higher is more anomalous"
        tests:
          - not_null

  - name: dim_accounts
    description: "Account dimension — descriptive attributes per account"
    columns:
      - name: account_id
        tests:
          - not_null
          - unique
      - name: is_laundering_account
        tests:
          - not_null
